<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Галерея фото сотрудников - Сопоставление</title>
<style>
body { font-family: system-ui; padding: 20px; background: #f5f5f5; }
h1 { color: #E8530A; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
.card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.card img { width: 100%; height: 300px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; }
.card h3 { margin: 0 0 8px 0; font-size: 14px; color: #333; word-break: break-all; }
.card input { width: 100%; padding: 8px; border: 2px solid #E8530A; border-radius: 6px; font-size: 14px; }
.card input:focus { outline: none; border-color: #d64809; }
button { background: #E8530A; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 20px; }
button:hover { background: #d64809; }
#result { margin-top: 20px; padding: 20px; background: white; border-radius: 12px; white-space: pre-wrap; font-family: monospace; font-size: 13px; }
</style>
</head>
<body>

<h1>🖼️ Галерея фото сотрудников</h1>
<p><strong>Инструкция:</strong> Под каждым фото напишите ФИО сотрудника, затем нажмите "Сгенерировать список"</p>

<div class="grid" id="gallery"></div>

<button onclick="generateList()">Сгенерировать список соответствий</button>

<div id="result"></div>

<script>
const photos = [
  "00e9a787-2b4d-452c-988a-7f7f6d41d361.jfif",
  "10dcacd1-8678-4903-be80-97c0eb1a4a58.jfif",
  "15a774b3-0103-48c5-8d30-cb6685bf324b.jfif",
  "19931cdf-6314-4d8e-bf02-f4894160dede.jfif",
  "1bb440b9-97f3-4121-997d-c7a3e94a12e6.jfif",
  "1d943e78-33c0-4356-9f8f-a4a64046523e.jfif",
  "242b6b22-1657-476b-bc42-24d2fb44d106.jfif",
  "26ce7279-8034-4361-a272-0a244e9ac1c5.jfif",
  "2c69f172-5b4f-4dc9-becd-090099f463c6.jfif",
  "4c120d19-9e0e-4b47-8265-53ff9d8f388e.jfif",
  "6df8af7d-1f70-48fe-a7b0-b90d5f3cdcb9.jfif",
  "7b5adac1-ddef-410f-9440-12be3759b45d.jfif",
  "92fcc065-e0a2-49f9-b36f-eecf22b280ce.jfif",
  "9305a58f-78ec-4efa-84d6-dc408181647c.jfif",
  "a6255703-5173-479f-8acb-7f011efd3be3.jfif",
  "acfd316e-2d8a-4bd7-abed-3a18b0d559cc.jfif",
  "b90a33ec-1c60-4a33-bb7f-4eb73d34951c.jfif",
  "baeab0bc-a04f-4018-9a67-800a271b77c9.jfif",
  "db870c32-1930-48fd-b6a6-e216c9480ac0.jfif",
  "ebb79be9-4e8e-4209-b4e1-dea9c4d0fb97.jfif",
  "f2676e70-ce61-4440-8275-503b5bdc854c.jfif",
  "f534e4b0-e157-4f01-8558-64bb8ac055e5.jfif",
  "fb60fe86-67b8-41f2-ba3e-9f07c3d8f0b3.jfif"
];

const gallery = document.getElementById('gallery');

photos.forEach((photo, index) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <img src="${photo}" alt="Фото ${index + 1}">
    <h3>${photo}</h3>
    <input type="text" id="name-${index}" placeholder="Введите ФИО сотрудника">
  `;
  gallery.appendChild(card);
});

function generateList() {
  let result = "// Соответствия файлов и сотрудников:\n\n";

  photos.forEach((photo, index) => {
    const name = document.getElementById(`name-${index}`).value.trim();
    if (name) {
      result += `"${photo}" = "${name}"\n`;
    }
  });

  document.getElementById('result').textContent = result;

  // Скопировать в буфер обмена
  navigator.clipboard.writeText(result);
  alert('✅ Список скопирован в буфер обмена!');
}
</script>

</body>
</html>
